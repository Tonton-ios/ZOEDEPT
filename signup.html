<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreye Kont | ZOE DEPT.</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <input class="nav-toggle-checkbox" type="checkbox" id="nav-toggle" aria-label="Ouvri meni a">
        <label class="hamburger" for="nav-toggle" aria-label="Ouvri meni a"><span></span></label>

        <nav class="nav-links" aria-label="Navigasyon prensipal">
            <details class="nav-menu">
                <summary>Atelye</summary>
                <div class="dropdown-menu">
                    <a href="fek-paret.html">Fèk Parèt</a>
                    <a href="tout-net.html">Tout Nèt</a>
                    <a href="mayo.html">Mayo</a>
                </div>
            </details>
            <a class="nav-direct" href="boutik.html">Boutik</a>
        </nav>

        <a class="brand" href="index.html" aria-label="Akèy ZOE DEPT.">
            <img src="img/zoe_logo.svg" alt="ZOE DEPT.">
        </a>

        <div class="nav-actions" aria-label="Aksyon">
            <button class="nav-action icon-search" type="button" aria-label="Rechèch"></button>
            <button class="nav-action icon-cart" type="button" aria-label="Panye"></button>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-container">
            <div class="auth-box">
                <h1>Kreye yon Kont</h1>
                <p class="auth-subtitle">Antre enfòmasyon ou anba a pou kontinye. Si ou deja gen yon kont, tanpri <a href="login.html">konekte</a> olye.</p>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="firstName">Premye non ou</label>
                        <input type="text" id="firstName" name="firstName" required aria-label="Premye non ou">
                    </div>

                    <div class="form-group">
                        <label for="lastName">Dènye non ou</label>
                        <input type="text" id="lastName" name="lastName" required aria-label="Dènye non ou">
                    </div>

                    <div class="form-group">
                        <label for="email">Adrès imèl</label>
                        <input type="email" id="email" name="email" required aria-label="Adrès imèl">
                    </div>

                    <div class="form-group">
                        <label for="password">Modpas</label>
                        <input type="password" id="password" name="password" required aria-label="Modpas">
                    </div>

                    <button type="submit" class="btn dark btn-full">KREYE KONT</button>
                </form>

                <div class="auth-links">
                    <p>Ou deja gen yon kont? <a href="login.html">Konekte</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <strong>ZOE DEPT.</strong>
        <span>Listwa on Peyi, Fyète on Pèp.</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName
                        }
                    }
                });

                if (error) {
                    alert('Erè kreyasyon kont: ' + error.message);
                    return;
                }

                alert('Kont ou kreye ak siksè! Tanpri verifye imèl ou pou konfime.');
                window.location.href = 'login.html';
            } catch (err) {
                alert('Erè: ' + err.message);
            }
        });
    </script>
</body>
</html>
